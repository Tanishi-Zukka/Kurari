server:
  port: 8080

spring:
  application:
    name: kurari-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/kurari
    username: kurari
    password: kurari
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

kurari:
  ai:
    # true のとき、Agent 不在でもジョブをダミー応答で即完了させる（開発用）
    mock: true
    # Agent の heartbeat がこの秒数途絶えたら offline 扱い
    agent-offline-after-seconds: 90
    # claimed のままこの秒数経過したジョブを pending に戻す
    job-timeout-seconds: 120
  uploads:
    dir: ./data/uploads
  presence:
    # プレゼンスの update がこの秒数途絶えたセッションを退室扱いにする
    offline-after-seconds: 90
  call:
    # 通話文字起こしをメモリに保持する最大行数
    transcript-max-lines: 2000
    # 最後の退出時に議事録を生成する最小文字数
    minutes-min-chars: 100
    # 通話中ライブ要約の定期実行間隔（ms）
    live-summary-interval-ms: 60000
    # 定期実行がライブ要約を作る最小の新規文字数（手動更新は1文字から）
    live-summary-min-new-chars: 120
  access:
    # 招待トークンの有効期限（最新1本のみ有効。再発行で失効）
    invite-ttl-seconds: 3600
    # 未処理の参加リクエストを破棄するまでの秒数
    pending-ttl-seconds: 900
    # 承認/拒否済みリクエストを保持する秒数（参加者のポーリングが結果を読む猶予）
    resolved-ttl-seconds: 600
    # 承認待ちの同時上限（超過は 429）
    max-pending: 20

springdoc:
  api-docs:
    path: /v3/api-docs
