services:
  db:
    # Docker公式イメージのECR Publicミラー（Docker Hubが不安定な環境でも取得できるため）
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: kurari-db
    environment:
      POSTGRES_USER: kurari
      POSTGRES_PASSWORD: kurari
      POSTGRES_DB: kurari
    ports:
      - "5432:5432"
    volumes:
      - kurari-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kurari"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  kurari-db-data:
